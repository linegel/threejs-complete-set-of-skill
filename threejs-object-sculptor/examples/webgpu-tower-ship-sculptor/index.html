<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#091012" />
    <title>Tower Ship · Object Sculptor Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --ink: #f2eadb;
        --muted: #9ca9aa;
        --panel: rgba(10, 17, 18, 0.82);
        --line: rgba(231, 212, 175, 0.17);
        --accent: #e7b66a;
      }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #091012; color: var(--ink); }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 72% 22%, rgba(225, 157, 78, 0.09), transparent 36%), linear-gradient(180deg, transparent 68%, rgba(0, 0, 0, 0.28));
      }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      .brand {
        position: fixed;
        top: 24px;
        left: 28px;
        z-index: 3;
        display: grid;
        gap: 4px;
        pointer-events: none;
      }
      .eyebrow { color: var(--accent); font: 700 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.18em; text-transform: uppercase; }
      h1 { margin: 0; font: 560 clamp(25px, 3vw, 42px)/1.05 Georgia, "Times New Roman", serif; letter-spacing: -0.025em; }
      .brand p { max-width: 450px; margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
      .controls {
        position: fixed;
        right: 24px;
        top: 24px;
        z-index: 4;
        width: min(330px, calc(100vw - 48px));
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px) saturate(1.2);
      }
      .controls header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
      .controls h2 { margin: 0; font-size: 14px; font-weight: 650; }
      #status { color: var(--muted); font: 600 9px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; text-transform: uppercase; }
      .selects { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
      label { display: grid; gap: 5px; color: var(--muted); font: 700 9px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.08em; text-transform: uppercase; }
      label:first-child { grid-column: 1 / -1; }
      select, button {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.045);
        color: var(--ink);
        padding: 0 10px;
        font: 600 12px/1 ui-sans-serif, system-ui, sans-serif;
      }
      select:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      select:disabled { opacity: 0.72; }
      .mode-copy { margin: 14px 0; padding: 13px 0; border-block: 1px solid var(--line); }
      .mode-copy strong { display: block; margin-bottom: 5px; font-size: 13px; }
      .mode-copy span { display: block; color: var(--muted); font-size: 11px; line-height: 1.45; }
      .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .metric { padding: 9px; border-radius: 8px; background: rgba(255, 255, 255, 0.035); }
      .metric b { display: block; font: 660 15px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .metric span { color: var(--muted); font-size: 9px; text-transform: uppercase; }
      button { margin-top: 12px; cursor: pointer; background: rgba(231, 182, 106, 0.1); color: #f4d39d; }
      button:hover { background: rgba(231, 182, 106, 0.16); border-color: rgba(231, 182, 106, 0.42); }
      .reference {
        position: fixed;
        z-index: 3;
        left: 28px;
        bottom: 26px;
        width: min(450px, calc(100vw - 56px));
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(18px);
        transform: translateY(calc(100% + 36px));
        opacity: 0;
        transition: transform 260ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease;
      }
      .reference[data-open] { transform: translateY(0); opacity: 1; }
      .reference img { display: block; width: 100%; border-radius: 7px; }
      .reference footer { display: flex; justify-content: space-between; gap: 16px; padding: 9px 3px 1px; color: var(--muted); font-size: 9px; line-height: 1.4; }
      .reference a { color: var(--accent); text-decoration: none; }
      .interaction-hint { position: fixed; z-index: 2; left: 50%; bottom: 18px; transform: translateX(-50%); color: rgba(230, 235, 232, 0.58); font: 600 9px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .08em; text-transform: uppercase; pointer-events: none; }
      @media (max-width: 740px) {
        .brand { top: 18px; left: 18px; }
        .brand p { display: none; }
        .controls { top: auto; right: 14px; bottom: 14px; width: calc(100vw - 28px); }
        .mode-copy { display: none; }
        .reference { left: 14px; bottom: 260px; width: calc(100vw - 28px); }
        .interaction-hint { display: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="Interactive procedural Tower Ship reconstruction"></canvas>
    <section class="brand" aria-label="Demo title">
      <span class="eyebrow">Object Sculptor / WebGPU</span>
      <h1>Tower Ship</h1>
      <p>A procedural, action-ready reconstruction. Every oar, roof, cabin tier, rigging socket, and lantern remains independently addressable.</p>
    </section>
    <aside class="controls" aria-label="Demo controls">
      <header><h2>Sculpt inspection</h2><span id="status">initializing WebGPU</span></header>
      <div class="selects">
        <label>Mode<select id="mode" aria-label="Inspection mode"></select></label>
        <label>Tier<select id="tier" aria-label="Geometry tier"></select></label>
        <label>Camera<select id="camera" aria-label="Review camera"></select></label>
      </div>
      <div class="mode-copy"><strong id="mode-title"></strong><span id="mode-description"></span></div>
      <div class="metrics" aria-label="Live geometry metrics">
        <div class="metric"><b id="metric-nodes">—</b><span>nodes</span></div>
        <div class="metric"><b id="metric-triangles">—</b><span>triangles</span></div>
        <div class="metric"><b id="metric-oars">—</b><span>oars</span></div>
      </div>
      <button id="compare" type="button" aria-pressed="false">Compare reference</button>
    </aside>
    <figure class="reference" id="reference-panel">
      <img id="reference-image" width="2880" height="1624" alt="Original Tower Ship procedural reconstruction reference" />
      <footer>
        <span>Reference and upstream Object Sculptor concept by Vinh Hiển.</span>
        <a href="https://github.com/vinhhien112/Three.js-Object-Sculptor-Codex-Plugin" target="_blank" rel="noreferrer">Original project ↗</a>
      </footer>
    </figure>
    <div class="interaction-hint">Drag to orbit · wheel to dolly · fixed cameras available above</div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
