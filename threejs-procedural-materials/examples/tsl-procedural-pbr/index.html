<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TSL Procedural PBR Materials</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1012;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .toolbar {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px;
        background: rgba(11, 14, 16, 0.72);
        color: #f1f5f7;
        font: 12px system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="toolbar">
      <select id="debug"></select>
      <label><input id="raw-emissive" type="checkbox"> raw emissive</label>
      <label><input id="bloom-only" type="checkbox"> bloom only</label>
      <label><input id="no-post" type="checkbox"> no post</label>
      <input id="scale" type="range" min="0.5" max="3" step="0.05" value="1">
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
