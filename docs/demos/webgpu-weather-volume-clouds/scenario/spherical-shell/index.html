<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="lab-id" content="webgpu-weather-volume-clouds">
  <meta name="lab-scenario" content="spherical-shell">
  <meta name="description" content="Fixed scenario state for Native WebGPU Weather Volume Clouds; the canonical interactive demo contains the indexable content.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://threejs-skills.com/demos/webgpu-weather-volume-clouds/">
  <title>Native WebGPU Weather Volume Clouds — scenario spherical-shell</title>
  <style>html,body,iframe{width:100%;height:100%;margin:0;border:0;background:#080b10;color:#ece8de}body{overflow:hidden}.route-blocker{box-sizing:border-box;max-width:760px;height:auto;margin:10vh auto;padding:28px;border:1px solid #ff6b6b;background:#111722;font:15px/1.55 system-ui,sans-serif}.route-blocker code{color:#ffb454}</style>
</head>
<body>
  <iframe id="canonical-lab" title="Native WebGPU Weather Volume Clouds — scenario spherical-shell" allow="fullscreen"></iframe>
  <script type="module">
    const frame = document.querySelector('#canonical-lab');
    const canonicalHref = "../../?scenario=spherical-shell";
    const startup = {"scenario":"spherical-shell","mode":"final"};
    const setterCalls = [{"setter":"setScenario","value":"spherical-shell"},{"setter":"setMode","value":"final"}];
    const routeKind = "scenario";
    const routeId = "spherical-shell";
    const acknowledgementKeys = ["scenario","scenarioId","activeScenario"];
    const startupAcknowledgementKeys = {"scenario":["scenario","scenarioId","activeScenario"],"mode":["mode","modeId","activeMode"],"tier":["tier","tierId","activeTier","quality","qualityTier"],"seed":["seed","currentSeed"],"camera":["camera","cameraId","activeCamera"],"time":["time","timeSeconds","currentTime"]};
    const controllerGlobals = ["labController","__LAB_CONTROLLER__","__labController","__imagePipelineValidation","__THREEJS_LAB__","__THREE_LAB__"];
    const awaitLockedRouteController = async function awaitLockedRouteController(resolveCandidate, {
  resolveBlocker = () => null,
  controllerGlobals = [
    'labController',
    '__LAB_CONTROLLER__',
    '__labController',
    '__imagePipelineValidation',
    '__THREEJS_LAB__',
    '__THREE_LAB__',
  ],
  timeoutMs = 60_000,
  pollIntervalMs = 50,
  now = () => performance.now(),
  sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds)),
  settleCandidate = (candidate, remainingMs) => new Promise((resolve, reject) => {
    const timer = setTimeout(
      () => reject(new Error(`Canonical LabController promise did not settle within ${remainingMs} ms.`)),
      remainingMs,
    );
    Promise.resolve(candidate).then(
      (value) => {
        clearTimeout(timer);
        resolve(value);
      },
      (error) => {
        clearTimeout(timer);
        reject(error);
      },
    );
  }),
} = {}) {
  if (typeof resolveCandidate !== 'function') throw new TypeError('resolveCandidate must be a function');
  if (typeof resolveBlocker !== 'function') throw new TypeError('resolveBlocker must be a function');
  if (!Number.isFinite(timeoutMs) || timeoutMs <= 0) throw new RangeError('timeoutMs must be finite and positive');
  if (!Number.isFinite(pollIntervalMs) || pollIntervalMs <= 0) throw new RangeError('pollIntervalMs must be finite and positive');
  if (!Array.isArray(controllerGlobals) || controllerGlobals.length === 0) {
    throw new TypeError('controllerGlobals must be a non-empty array');
  }

  const deadline = now() + timeoutMs;
  while (true) {
    const blocker = resolveBlocker();
    if (blocker) throw new Error(`Canonical lab reported an initialization blocker: ${String(blocker)}`);

    const candidate = resolveCandidate();
    if (candidate !== undefined && candidate !== null) {
      const remainingMs = Math.max(0, deadline - now());
      const controller = typeof candidate?.then === 'function'
        ? await settleCandidate(candidate, remainingMs)
        : candidate;
      if (controller) return controller;
    }

    const remainingMs = deadline - now();
    if (remainingMs <= 0) break;
    await sleep(Math.min(pollIntervalMs, remainingMs));
  }

  throw new Error(
    `Canonical lab did not expose any LabController alias (${controllerGlobals.join(', ')}) within ${timeoutMs} ms.`,
  );
};
    const lockedRouteSelectionMatchesWithKeys = function lockedRouteSelectionMatchesWithKeys(
  metrics,
  kind,
  id,
  startup = {},
  acknowledgementKeys = [],
  startupAcknowledgementKeys = {},
) {
  if (!metrics || typeof metrics !== 'object') return false;
  const routeValue = (value) => {
    if (value && typeof value === 'object') return value.id ?? value.name ?? null;
    return value;
  };
  const metricCandidates = (keys, nestedKey) => {
    const nested = metrics.routeSelection;
    return [
      ...keys.map((key) => metrics[key]),
      nested?.[nestedKey],
      nested?.kind === nestedKey ? nested.id : null,
    ].map(routeValue);
  };
  const direct = metricCandidates(acknowledgementKeys, kind).includes(id);
  const startupEntries = Object.entries(startup);
  const startupMatches = startupEntries.every(([key, expected]) => (
    metricCandidates(startupAcknowledgementKeys[key] ?? [], key).includes(expected)
  ));
  return direct && startupMatches;
};
    let routeInitializationStarted = false;
    frame.addEventListener('load', async () => {
      if (routeInitializationStarted) return;
      routeInitializationStarted = true;
      try {
        const controller = await awaitLockedRouteController(
          () => {
            for (const name of controllerGlobals) {
              const candidate = frame.contentWindow[name];
              if (candidate !== undefined && candidate !== null) return candidate;
            }
            return null;
          },
          {
            controllerGlobals,
            resolveBlocker: () => (
              frame.contentWindow.__LAB_ERROR__
              ?? frame.contentWindow.__labError
              ?? frame.contentWindow.__lab?.error
              ?? null
            ),
          },
        );
        if (typeof controller.ready !== 'function') throw new Error('Canonical lab controller has no ready() method.');
        await controller.ready();
        for (const call of setterCalls) {
          if (typeof controller[call.setter] !== 'function') throw new Error('Canonical lab controller has no ' + call.setter + '() method.');
          await controller[call.setter](call.value);
        }
        if (typeof controller.renderOnce === 'function') await controller.renderOnce();
        if (typeof controller.getMetrics !== 'function') throw new Error('Canonical lab controller has no getMetrics() route acknowledgement.');
        const metrics = await controller.getMetrics();
        if (!lockedRouteSelectionMatchesWithKeys(
          metrics,
          routeKind,
          routeId,
          startup,
          acknowledgementKeys,
          startupAcknowledgementKeys,
        )) {
          throw new Error('Canonical lab did not acknowledge locked ' + routeKind + ' route "' + routeId + '" and every explicit startup value in getMetrics().');
        }
        window.labController = controller;
        window.dispatchEvent(new CustomEvent('lab-route-ready', { detail: { kind: "scenario", id: "spherical-shell", startup } }));
      } catch (error) {
        window.__LAB_ROUTE_ERROR__ = String(error?.stack ?? error);
        const message = String(error?.stack ?? error).replace(/[&<>]/g, (character) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[character]));
        document.body.innerHTML = '<main class="route-blocker"><h1>Locked route failed</h1><p>This route cannot silently fall back to a default state.</p><pre><code>' + message + '</code></pre></main>';
      }
    });
    frame.src = canonicalHref;
  </script>
</body>
</html>
