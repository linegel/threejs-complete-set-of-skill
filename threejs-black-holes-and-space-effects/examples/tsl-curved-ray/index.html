<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Native WebGPU Space Integrator Lab</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #02030a;
        color: #eef2ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      [data-stage] {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      [data-status] {
        position: fixed;
        left: 12px;
        bottom: 12px;
        max-width: min(520px, calc(100vw - 24px));
        padding: 7px 9px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        background: rgba(2, 3, 10, 0.72);
        color: rgba(238, 242, 255, 0.9);
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "../../../node_modules/three/build/three.webgpu.js",
          "three/webgpu": "../../../node_modules/three/build/three.webgpu.js",
          "three/tsl": "../../../node_modules/three/build/three.tsl.js",
          "three/addons/": "../../../node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main data-stage>
      <canvas></canvas>
    </main>
    <div data-status>Starting native WebGPU Space Integrator Lab</div>
    <pre data-metrics style="position:fixed;right:12px;top:12px;max-width:min(420px,40vw);max-height:35vh;overflow:auto;color:#cbd8ff;background:#02030acc;padding:8px;font:11px/1.3 ui-monospace,monospace"></pre>
    <script type="module" src="./space-browser.mjs"></script>
  </body>
</html>
